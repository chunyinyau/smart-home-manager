services:
  # 0. RabbitMQ Broker (Ports 5672 and 15672 on host)
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 1. Rate Database Component (Port 33061 on host)
  rate_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: rate_db
      MYSQL_ROOT_PASSWORD: rate_root_password
    ports:
      - "33061:3306"
    volumes:
      - rate_db_data:/var/lib/mysql

  # 2. Rate API Component (Port 5007 on host)
  rate_service:
    build: ./rate-service
    restart: always
    ports:
      - "5007:5007"
    environment:
      - DATABASE_URL=mysql+pymysql://root:rate_root_password@rate_db:3306/rate_db
    depends_on:
      - rate_db

  # 3. Bill Database Component (Port 33062 on host)
  bill_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: bill_db
      MYSQL_ROOT_PASSWORD: bill_root_password
    ports:
      - "33062:3306"
    volumes:
      - bill_db_data:/var/lib/mysql

  # 4. Bill API Component (Port 5003 on host)
  bill_service:
    build: ./bill-service
    restart: always
    ports:
      - "5003:5003"
    environment:
      - DATABASE_URL=mysql+pymysql://root:bill_root_password@bill_db:3306/bill_db
    depends_on:
      - bill_db

  # 5. Budget Database Component (Port 33063 on host)
  budget_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: budget_db
      MYSQL_ROOT_PASSWORD: budget_root_password
    ports:
      - "33063:3306"
    volumes:
      - budget_db_data:/var/lib/mysql

  # 6. Budget API Component (Port 5004 on host)
  budget_service:
    build: ./budget-service
    restart: always
    ports:
      - "5004:5004"
    environment:
      - DATABASE_URL=mysql+pymysql://root:budget_root_password@budget_db:3306/budget_db
    depends_on:
      - budget_db
  # 5. Appliance Database Component (Port 33063 on host)
  appliance_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: appliance_db
      MYSQL_ROOT_PASSWORD: appliance_root_password
    ports:
      - "33064:3306"
    volumes:
      - appliance_db_data:/var/lib/mysql

  # 6. Appliance API Component (Port 5002 on host)
  appliance_service:
    build: ./appliance-service
    restart: always
    ports:
      - "5002:5002"
    environment:
      - DATABASE_URL=mysql+pymysql://root:appliance_root_password@appliance_db:3306/appliance_db
      - APPLIANCE_TELEMETRY_CSV=/app/data/appliance_energy_data.csv
      - APPLIANCE_TELEMETRY_STATE_FILE=/app/data/appliance_telemetry_state.json
      - APPLIANCE_REPLAY_INTERVAL_SECONDS=300
    depends_on:
      - appliance_db
    volumes:
      - ./appliance-service/seed:/app/seed:ro
      - ./appliance-service/data:/app/data

  # 7. History Database Component (Port 33065 on host)
  history_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: history_db
      MYSQL_ROOT_PASSWORD: history_root_password
    ports:
      - "33065:3306"
    volumes:
      - history_db_data:/var/lib/mysql

  # 8. History API Component (Port 5005 on host)
  history_service:
    build:
      context: .
      dockerfile: history-service/Dockerfile
    restart: always
    ports:
      - "5005:5005"
    environment:
      - DATABASE_URL=mysql+pymysql://root:history_root_password@history_db:3306/history_db
      - RABBITMQ_URLS=amqp://guest:guest@rabbitmq:5672
      - HISTORY_EVENTS_QUEUE=history.events.v1
    depends_on:
      - history_db
      - rabbitmq

  # 11. Display Composite Service (Port 5006 on host) — no DB
  display_service:
    build: ./display-service
    restart: always
    ports:
      - "5006:5006"
    environment:
      - BUDGET_SERVICE_URL=http://budget_service:5004
      - HISTORY_SERVICE_URL=http://history_service:5005
      - BILL_SERVICE_URL=http://bill_service:5003
      - APPLIANCE_SERVICE_URL=http://appliance_service:5002
      - PROFILE_SERVICE_URL=https://personal-2nbikeej.outsystemscloud.com/Profile/rest/Profile/profile
      - REQUEST_TIMEOUT_SECONDS=8
    depends_on:
      - budget_service
      - history_service
      - bill_service
      - appliance_service

  # 12. CalculateBill Composite Service (Port 5008 on host) - no DB
  calculatebill_service:
    build: ./calculatebill-service
    restart: always
    ports:
      - "5008:5008"
    environment:
      - APPLIANCE_SERVICE_URL=http://appliance_service:5002
      - RATE_SERVICE_URL=http://rate_service:5007
      - BILL_SERVICE_URL=http://bill_service:5003
      - BUDGET_SERVICE_URL=http://budget_service:5004
      - REQUEST_TIMEOUT_SECONDS=8
      - DEFAULT_BILL_USER_ID=1
      - DEFAULT_APPLIANCE_UID=user_demo_001
      - BILL_INTERVAL_MINUTES=5
      - SYNC_BUDGET_EACH_RUN=true
      - AUTO_CLOSE_AT_MONTH_END=false
      - ENABLE_CALCULATEBILL_CRON=true
    depends_on:
      - appliance_service
      - rate_service
      - bill_service
      - budget_service

volumes:
  rabbitmq_data:
  rate_db_data:
  bill_db_data:
  budget_db_data:
  appliance_db_data:
  history_db_data:
