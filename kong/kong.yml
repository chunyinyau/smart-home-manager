_format_version: "3.0"
_transform: true

services:
  - name: rate-service
    url: http://rate_service:5007
    routes:
      - name: rate-root
        paths:
          - /rate
        strip_path: true

  - name: appliance-service
    url: http://appliance_service:5002
    routes:
      - name: appliance-root
        paths:
          - /appliance
        strip_path: true

  - name: bill-service
    url: http://bill_service:5003
    routes:
      - name: bill-root
        paths:
          - /bills
        strip_path: true

  - name: budget-service
    url: http://budget_service:5004
    routes:
