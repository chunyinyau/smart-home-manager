        strip_path: true

  - name: history-service
    url: http://history_service:5005
    routes:
      - name: history-root
        paths:
          - /history
        strip_path: true

  - name: display-service
    url: http://display_service:5006
    routes:
      - name: display-root
        paths:
          - /display
        strip_path: true

  - name: calculatebill-service
    url: http://calculatebill_service:5008
    routes:
      - name: calculatebill-root
